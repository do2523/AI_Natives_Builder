<!doctype html>
<html>
  <head>
    <title>Pizzeria DB UI</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Pizzeria Database UI</h1>

    <section>
      <h2>Add Customer</h2>
      <form id="customerForm">
        <input
          type="number"
          id="customerID"
          placeholder="Customer ID"
          required
        />
        <input type="text" id="customerName" placeholder="Name" required />
        <input type="text" id="phone" placeholder="Phone" />
        <input type="email" id="email" placeholder="Email" />
        <button type="submit">Add Customer</button>
      </form>
    </section>

    <section>
      <h2>Add Order</h2>
      <form id="orderForm">
        <input type="number" id="orderID" placeholder="Order ID" required />
        <input type="date" id="orderDate" required />
        <input type="text" id="status" placeholder="Status" value="Pending" />
        <input
          type="number"
          id="orderCustomerID"
          placeholder="Customer ID"
          required
        />
        <button type="submit">Add Order</button>
      </form>
    </section>

    <section>
      <h2>Orders</h2>
      <button onclick="loadOrders()">Load Orders</button>
      <div id="orders"></div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
